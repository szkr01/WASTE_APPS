<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>wd-eva02-large-tagger-v3 Browser Demo</title>

  <script src="https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/ort.webgpu.min.js"></script>

  <style>
    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      max-width: 960px;
      margin: 32px auto;
      padding: 0 16px;
      line-height: 1.6;
      background: #f7f7f8;
      color: #222;
    }
    h1 { font-size: 22px; }
    .panel {
      background: white;
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 16px;
      margin: 16px 0;
    }
    button, input {
      font: inherit;
    }
    button {
      padding: 8px 12px;
      border: 1px solid #aaa;
      border-radius: 8px;
      background: #fff;
      cursor: pointer;
    }
    button:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    label {
      display: block;
      margin: 8px 0;
    }
    img {
      max-width: 320px;
      max-height: 320px;
      border-radius: 8px;
      border: 1px solid #ddd;
      background: white;
    }
    pre {
      white-space: pre-wrap;
      word-break: break-word;
      background: #111;
      color: #eee;
      padding: 12px;
      border-radius: 8px;
      overflow: auto;
    }
    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 8px;
      font-size: 14px;
    }
    th, td {
      border-bottom: 1px solid #eee;
      padding: 6px 8px;
      text-align: left;
    }
    .muted { color: #666; }
  </style>
</head>

<body>
  <h1>SmilingWolf/wd-eva02-large-tagger-v3 Browser Demo</h1>

  <div class="panel">
    <p class="muted">
      画像はブラウザ内で前処理され、ONNX Runtime Web で推論されます。
      サーバー側の推論 API は使いません。
    </p>

    <button id="loadBtn">モデルを読み込む</button>
    <span id="status">未読み込み</span>
  </div>

  <div class="panel">
    <input id="fileInput" type="file" accept="image/*" />

    <label>
      general threshold:
      <input id="generalThreshold" type="number" min="0" max="1" step="0.01" value="0.35" />
    </label>

    <label>
      character threshold:
      <input id="characterThreshold" type="number" min="0" max="1" step="0.01" value="0.85" />
    </label>

    <label>
      表示件数:
      <input id="topN" type="number" min="1" max="200" step="1" value="60" />
    </label>

    <button id="runBtn" disabled>タグ推定</button>

    <div style="margin-top: 12px;">
      <img id="preview" alt="preview" hidden />
    </div>
  </div>

  <div class="panel">
    <h2>Prompt tags</h2>
    <pre id="promptOut"></pre>
  </div>

  <div class="panel">
    <h2>Rating</h2>
    <div id="ratingOut"></div>
  </div>

  <div class="panel">
    <h2>General tags</h2>
    <div id="generalOut"></div>
  </div>

  <div class="panel">
    <h2>Character tags</h2>
    <div id="characterOut"></div>
  </div>

<script>
"use strict";

const REPO = "SmilingWolf/wd-eva02-large-tagger-v3";
const MODEL_URL = `https://huggingface.co/${REPO}/resolve/main/model.onnx`;
const TAGS_URL = `https://huggingface.co/${REPO}/resolve/main/selected_tags.csv`;

const TARGET_SIZE = 448;

const kaomojis = new Set([
  "0_0", "(o)_(o)", "+_+", "+_-", "._.", "_", "<|>_<|>", "=_=", ">_<",
  "3_3", "6_9", ">_o", "@_@", "^_^", "o_o", "u_u", "x_x", "|_|", "||_||"
]);

let session = null;
let labels = null;
let loadedImage = null;

const $ = (id) => document.getElementById(id);

function setStatus(text) {
  $("status").textContent = text;
}

function parseCSV(text) {
  const rows = [];
  let row = [];
  let field = "";
  let inQuotes = false;

  for (let i = 0; i < text.length; i++) {
    const c = text[i];
    const n = text[i + 1];

    if (inQuotes) {
      if (c === '"' && n === '"') {
        field += '"';
        i++;
      } else if (c === '"') {
        inQuotes = false;
      } else {
        field += c;
      }
    } else {
      if (c === '"') {
        inQuotes = true;
      } else if (c === ",") {
        row.push(field);
        field = "";
      } else if (c === "\n") {
        row.push(field);
        rows.push(row);
        row = [];
        field = "";
      } else if (c !== "\r") {
        field += c;
      }
    }
  }

  if (field.length > 0 || row.length > 0) {
    row.push(field);
    rows.push(row);
  }

  return rows;
}

async function loadLabels() {
  const res = await fetch(TAGS_URL);
  if (!res.ok) throw new Error(`selected_tags.csv の取得に失敗しました: ${res.status}`);
  const text = await res.text();
  const rows = parseCSV(text);

  const header = rows.shift();
  const nameIndex = header.indexOf("name");
  const categoryIndex = header.indexOf("category");

  if (nameIndex < 0 || categoryIndex < 0) {
    throw new Error("selected_tags.csv に name または category 列がありません。");
  }

  const tagNames = [];
  const ratingIndexes = [];
  const generalIndexes = [];
  const characterIndexes = [];

  rows.forEach((r, i) => {
    const rawName = r[nameIndex];
    const category = Number(r[categoryIndex]);

    if (!rawName) return;

    const name = kaomojis.has(rawName) ? rawName : rawName.replaceAll("_", " ");
    const idx = tagNames.length;

    tagNames.push(name);

    if (category === 9) ratingIndexes.push(idx);
    if (category === 0) generalIndexes.push(idx);
    if (category === 4) characterIndexes.push(idx);
  });

  return { tagNames, ratingIndexes, generalIndexes, characterIndexes };
}

async function loadModel() {
  $("loadBtn").disabled = true;

  try {
    setStatus("ラベルを読み込み中");
    labels = await loadLabels();

    ort.env.wasm.wasmPaths = "https://cdn.jsdelivr.net/npm/onnxruntime-web@1.23.0/dist/";
    ort.env.wasm.numThreads = 1;

    setStatus("モデルを読み込み中。model.onnx は約 1.26 GB です。");

    try {
      session = await ort.InferenceSession.create(MODEL_URL, {
        executionProviders: ["webgpu", "wasm"],
        graphOptimizationLevel: "all"
      });
    } catch (webgpuError) {
      console.warn("WebGPU load failed. Retrying with WASM.", webgpuError);
      session = await ort.InferenceSession.create(MODEL_URL, {
        executionProviders: ["wasm"],
        graphOptimizationLevel: "all"
      });
    }

    setStatus(`読み込み完了。入力: ${session.inputNames.join(", ")} / 出力: ${session.outputNames.join(", ")}`);
    $("runBtn").disabled = !loadedImage;
  } catch (err) {
    console.error(err);
    setStatus(`エラー: ${err.message}`);
    $("loadBtn").disabled = false;
  }
}

function loadImageFromFile(file) {
  return new Promise((resolve, reject) => {
    const url = URL.createObjectURL(file);
    const img = new Image();

    img.onload = () => {
      URL.revokeObjectURL(url);
      resolve(img);
    };

    img.onerror = () => {
      URL.revokeObjectURL(url);
      reject(new Error("画像の読み込みに失敗しました。"));
    };

    img.src = url;
  });
}

function prepareImageTensor(img) {
  const canvas = document.createElement("canvas");
  canvas.width = TARGET_SIZE;
  canvas.height = TARGET_SIZE;

  const ctx = canvas.getContext("2d", { willReadFrequently: true });
  ctx.fillStyle = "white";
  ctx.fillRect(0, 0, TARGET_SIZE, TARGET_SIZE);

  const scale = TARGET_SIZE / Math.max(img.naturalWidth, img.naturalHeight);
  const width = Math.round(img.naturalWidth * scale);
  const height = Math.round(img.naturalHeight * scale);
  const x = Math.floor((TARGET_SIZE - width) / 2);
  const y = Math.floor((TARGET_SIZE - height) / 2);

  ctx.imageSmoothingEnabled = true;
  ctx.imageSmoothingQuality = "high";
  ctx.drawImage(img, x, y, width, height);

  const rgba = ctx.getImageData(0, 0, TARGET_SIZE, TARGET_SIZE).data;
  const input = new Float32Array(TARGET_SIZE * TARGET_SIZE * 3);

  let j = 0;
  for (let i = 0; i < rgba.length; i += 4) {
    input[j++] = rgba[i + 2];
    input[j++] = rgba[i + 1];
    input[j++] = rgba[i];
  }

  return new ort.Tensor("float32", input, [1, TARGET_SIZE, TARGET_SIZE, 3]);
}

function sortByScoreDesc(items) {
  return items.sort((a, b) => b.score - a.score);
}

function extractResults(preds, generalThreshold, characterThreshold) {
  const tagNames = labels.tagNames;

  const ratings = labels.ratingIndexes.map(i => ({
    tag: tagNames[i],
    score: preds[i]
  }));

  const general = labels.generalIndexes
    .map(i => ({ tag: tagNames[i], score: preds[i] }))
    .filter(x => x.score >= generalThreshold);

  const characters = labels.characterIndexes
    .map(i => ({ tag: tagNames[i], score: preds[i] }))
    .filter(x => x.score >= characterThreshold);

  return {
    ratings: sortByScoreDesc(ratings),
    general: sortByScoreDesc(general),
    characters: sortByScoreDesc(characters)
  };
}

function renderTable(containerId, rows, limit) {
  const target = $(containerId);
  const shown = rows.slice(0, limit);

  if (shown.length === 0) {
    target.textContent = "該当なし";
    return;
  }

  const table = document.createElement("table");
  table.innerHTML = `
    <thead>
      <tr>
        <th>tag</th>
        <th>score</th>
      </tr>
    </thead>
    <tbody></tbody>
  `;

  const tbody = table.querySelector("tbody");

  for (const r of shown) {
    const tr = document.createElement("tr");
    const tag = document.createElement("td");
    const score = document.createElement("td");

    tag.textContent = r.tag;
    score.textContent = r.score.toFixed(4);

    tr.appendChild(tag);
    tr.appendChild(score);
    tbody.appendChild(tr);
  }

  target.innerHTML = "";
  target.appendChild(table);
}

async function runTagger() {
  if (!session || !labels || !loadedImage) return;

  $("runBtn").disabled = true;
  setStatus("推論中");

  try {
    const inputTensor = prepareImageTensor(loadedImage);
    const feeds = {};
    feeds[session.inputNames[0]] = inputTensor;

    const output = await session.run(feeds);
    const outputTensor = output[session.outputNames[0]];
    const preds = Array.from(outputTensor.data);

    const generalThreshold = Number($("generalThreshold").value);
    const characterThreshold = Number($("characterThreshold").value);
    const topN = Number($("topN").value);

    const result = extractResults(preds, generalThreshold, characterThreshold);

    const promptTags = result.general
      .slice(0, topN)
      .map(x => x.tag.replaceAll(" ", "_"))
      .join(", ");

    $("promptOut").textContent = promptTags;

    renderTable("ratingOut", result.ratings, result.ratings.length);
    renderTable("generalOut", result.general, topN);
    renderTable("characterOut", result.characters, topN);

    setStatus("推論完了");
  } catch (err) {
    console.error(err);
    setStatus(`エラー: ${err.message}`);
  } finally {
    $("runBtn").disabled = false;
  }
}

$("loadBtn").addEventListener("click", loadModel);
$("runBtn").addEventListener("click", runTagger);

$("fileInput").addEventListener("change", async (ev) => {
  const file = ev.target.files && ev.target.files[0];
  if (!file) return;

  try {
    loadedImage = await loadImageFromFile(file);

    const preview = $("preview");
    preview.src = loadedImage.src;
    preview.hidden = false;

    $("runBtn").disabled = !session;
  } catch (err) {
    console.error(err);
    setStatus(`エラー: ${err.message}`);
  }
});
</script>
</body>
</html>
