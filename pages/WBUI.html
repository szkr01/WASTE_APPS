<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ComfyUI Mobile Controller</title>
    <meta name="description" content="Mobile-optimized frontend for local ComfyUI generation.">
    <meta name="page:icon" content="fas fa-magic">
    <meta name="page:color" content="#3b82f6">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        /* Custom Styles & Utilities */
        :root {
            --app-height: 100vh;
        }
        body {
            height: var(--app-height);
            overflow: hidden;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #ffffff;
            color: #1e293b;
            touch-action: pan-x pan-y;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }
        /* Hide scrollbar for IE, Edge and Firefox */
        .no-scrollbar {
            -ms-overflow-style: none;  /* IE and Edge */
            scrollbar-width: none;  /* Firefox */
        }

        /* TikTok Style Timeline */
        .snap-container {
            scroll-snap-type: y mandatory;
            overflow-y: scroll;
            height: 100%;
        }
        .snap-item {
            scroll-snap-align: start;
            height: 100%;
            width: 100%;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f8fafc;
        }

        /* Autocomplete Dropdown */
        .autocomplete-dropdown {
            position: absolute;
            z-index: 50;
            width: 100%;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 0.375rem;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            max-height: 200px;
            overflow-y: auto;
            display: none;
        }
        .autocomplete-item {
            padding: 0.5rem;
            border-bottom: 1px solid #f1f5f9;
            cursor: pointer;
            display: flex;
            justify-content: space-between;
            font-size: 0.875rem;
        }
        .autocomplete-item:hover {
            background-color: #f8fafc;
        }
        .tag-cat-0 { color: #3b82f6; } /* General */
        .tag-cat-1 { color: #ef4444; } /* Artist */
        .tag-cat-3 { color: #a855f7; } /* Copyright */
        .tag-cat-4 { color: #22c55e; } /* Character */
        .tag-cat-5 { color: #eab308; } /* Meta */

        /* Form Elements */
        .input-base {
            width: 100%;
            background-color: #f8fafc;
            border: 1px solid #e2e8f0;
            border-radius: 0.5rem;
            padding: 0.75rem;
            font-size: 0.875rem;
            outline: none;
            transition: border-color 0.2s;
        }
        .input-base:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 1px #3b82f6;
        }
        .label-base {
            display: block;
            font-size: 0.75rem;
            font-weight: 600;
            color: #64748b;
            margin-bottom: 0.25rem;
            text-transform: uppercase;
        }

        /* Toggle Switch */
        .toggle-checkbox:checked {
            right: 0;
            border-color: #3b82f6;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #3b82f6;
        }
        
        /* Modal */
        .modal-overlay {
            background-color: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(2px);
        }

        /* Range Slider */
        input[type=range] {
            -webkit-appearance: none;
            width: 100%;
            background: transparent;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px;
            width: 16px;
            border-radius: 50%;
            background: #3b82f6;
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 4px;
            cursor: pointer;
            background: #e2e8f0;
            border-radius: 2px;
        }
    </style>
</head>
<body class="flex flex-col">

    <!-- Main Content Area -->
    <main class="flex-1 relative overflow-hidden bg-white pb-16" id="main-content">
        
        <!-- Tab 1: Timeline -->
        <div id="tab-timeline" class="tab-pane h-full w-full hidden">
            <div class="snap-container no-scrollbar" id="timeline-container">
                <div class="h-full flex items-center justify-center text-slate-400 flex-col gap-4">
                    <i class="fas fa-images text-4xl"></i>
                    <p>生成された画像がここに表示されます</p>
                </div>
            </div>
            
            <!-- Image Details Modal -->
            <div id="image-modal" class="hidden absolute inset-0 z-50 flex flex-col bg-white">
                <div class="flex justify-between items-center p-4 border-b">
                    <h3 class="font-bold">画像情報</h3>
                    <button onclick="closeImageModal()" class="p-2 text-slate-500 hover:text-slate-800"><i class="fas fa-times text-xl"></i></button>
                </div>
                <div class="flex-1 overflow-y-auto p-4 space-y-4 text-sm" id="image-modal-content">
                    <!-- Populated via JS -->
                </div>
            </div>
        </div>

        <!-- Tab 2: Prefix -->
        <div id="tab-prefix" class="tab-pane h-full w-full hidden overflow-y-auto p-4">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">プレフィックス設定</h2>
            <div class="space-y-4 relative">
                <div>
                    <label class="label-base">共通プロンプト (Node: 29)</label>
                    <div class="relative">
                        <textarea id="input-prefix" class="input-base h-32 resize-none" placeholder="全体に適用するタグを入力..."></textarea>
                        <div id="auto-prefix" class="autocomplete-dropdown"></div>
                    </div>
                </div>
                <div>
                    <label class="label-base">プリセット</label>
                    <div class="flex flex-wrap gap-2" id="prefix-presets">
                        <button class="px-3 py-1 bg-slate-100 border border-slate-200 rounded-full text-sm hover:bg-slate-200" data-val="score_9, score_8_up, score_7_up, high quality, masterpiece">高品質アニメ</button>
                        <button class="px-3 py-1 bg-slate-100 border border-slate-200 rounded-full text-sm hover:bg-slate-200" data-val="score_8, year 2025, newest, steam">新しめ高スコア</button>
                        <button class="px-3 py-1 bg-slate-100 border border-slate-200 rounded-full text-sm hover:bg-slate-200" data-val="cinematic lighting, intricate detail, depth of field">シネマティック</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 3: Character -->
        <div id="tab-character" class="tab-pane h-full w-full hidden overflow-y-auto p-4">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">キャラクター設定</h2>
            <div class="space-y-4">
                <div>
                    <label class="label-base">現在選択中のキャラクター (Node: 28)</label>
                    <div class="relative">
                        <input type="text" id="input-character" class="input-base" placeholder="例: shigure_ui_(vtuber) solo">
                        <div id="auto-character" class="autocomplete-dropdown"></div>
                    </div>
                </div>
                <div>
                    <div class="flex justify-between items-center mb-2">
                        <label class="label-base mb-0">保存済み候補</label>
                        <button id="btn-add-char" class="text-blue-500 text-sm"><i class="fas fa-plus"></i> 追加</button>
                    </div>
                    <ul id="char-list" class="space-y-2">
                        <!-- Populated via JS -->
                    </ul>
                </div>
            </div>
        </div>

        <!-- Tab 4: Situation -->
        <div id="tab-situation" class="tab-pane h-full w-full hidden overflow-y-auto p-4">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">シチュエーション設定</h2>
            <div class="space-y-4">
                <div>
                    <label class="label-base">現在のシチュエーション (Node: 27)</label>
                    <div class="relative">
                        <textarea id="input-situation" class="input-base h-24 resize-none" placeholder="背景や構図などを入力..."></textarea>
                        <div id="auto-situation" class="autocomplete-dropdown"></div>
                    </div>
                </div>
                
                <div class="flex items-center justify-between p-3 border rounded-lg bg-slate-50">
                    <div>
                        <span class="font-bold text-sm block">ランダム選択モード</span>
                        <span class="text-xs text-slate-500">生成時に下部の候補から1つランダムに選びます</span>
                    </div>
                    <div class="relative inline-block w-10 mr-2 align-middle select-none transition duration-200 ease-in">
                        <input type="checkbox" name="toggle" id="toggle-random-situ" class="toggle-checkbox absolute block w-5 h-5 rounded-full bg-white border-4 appearance-none cursor-pointer transition-all duration-300 z-10"/>
                        <label for="toggle-random-situ" class="toggle-label block overflow-hidden h-5 rounded-full bg-slate-300 cursor-pointer transition-colors duration-300"></label>
                    </div>
                </div>

                <div>
                    <label class="label-base">候補プリセット (タップで追加/選択)</label>
                    <div class="flex flex-wrap gap-2" id="situ-presets">
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="classroom, desk, window">classroom</button>
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="night city, neon lights, raining">night city</button>
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="cafe, coffee cup, table">cafe</button>
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="beach, ocean, clear sky, summer">beach</button>
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="rainy day, umbrella, wet clothes">rainy day</button>
                        <button class="situ-preset px-3 py-1 bg-white border border-slate-300 rounded-full text-sm text-slate-700" data-val="photo studio, simple background">studio</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Tab 5: Model -->
        <div id="tab-model" class="tab-pane h-full w-full hidden overflow-y-auto p-4 pb-20">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">モデル・パラメータ設定</h2>
            
            <div class="space-y-6">
                <!-- Base Models -->
                <section>
                    <h3 class="font-bold text-slate-700 mb-2"><i class="fas fa-cube w-5"></i>ベースモデル</h3>
                    <div class="grid grid-cols-1 gap-3">
                        <div>
                            <label class="label-base">UNET (Node 5)</label>
                            <input type="text" id="model-unet" class="input-base py-1.5" value="anima-preview3-base.safetensors">
                        </div>
                        <div>
                            <label class="label-base">CLIP (Node 2)</label>
                            <input type="text" id="model-clip" class="input-base py-1.5" value="qwen_3_06b_base.safetensors">
                        </div>
                        <div>
                            <label class="label-base">VAE (Node 1)</label>
                            <input type="text" id="model-vae" class="input-base py-1.5" value="qwen_image_vae.safetensors">
                        </div>
                        <div>
                            <label class="label-base">Upscaler (Node 4)</label>
                            <input type="text" id="model-upscale" class="input-base py-1.5" value="2x-AnimeSharpV4_Fast_RCAN_PU.safetensors">
                        </div>
                    </div>
                </section>

                <!-- Size -->
                <section>
                    <h3 class="font-bold text-slate-700 mb-2"><i class="fas fa-crop-simple w-5"></i>サイズ (Node 9)</h3>
                    <div class="flex gap-2">
                        <div class="flex-1">
                            <label class="label-base">Width</label>
                            <input type="number" id="size-w" class="input-base py-1.5" value="824">
                        </div>
                        <div class="flex-1">
                            <label class="label-base">Height</label>
                            <input type="number" id="size-h" class="input-base py-1.5" value="1216">
                        </div>
                        <div class="w-16">
                            <label class="label-base">Batch</label>
                            <input type="number" id="size-b" class="input-base py-1.5" value="1" min="1" max="4">
                        </div>
                    </div>
                </section>

                <!-- KSampler -->
                <section>
                    <h3 class="font-bold text-slate-700 mb-2"><i class="fas fa-sliders w-5"></i>サンプラー (Node 13)</h3>
                    <div class="space-y-3">
                        <div>
                            <label class="label-base flex justify-between">
                                Seed
                                <span class="text-blue-500 font-normal cursor-pointer" id="btn-random-seed"><i class="fas fa-dice"></i> Randomize</span>
                            </label>
                            <div class="flex gap-2">
                                <input type="number" id="sampler-seed" class="input-base py-1.5 flex-1">
                                <div class="flex items-center gap-1 text-xs">
                                    <input type="checkbox" id="auto-seed" checked>
                                    <label for="auto-seed">Auto</label>
                                </div>
                            </div>
                        </div>
                        <div class="grid grid-cols-2 gap-2">
                            <div>
                                <label class="label-base">Steps</label>
                                <input type="number" id="sampler-steps" class="input-base py-1.5" value="8">
                            </div>
                            <div>
                                <label class="label-base">CFG</label>
                                <input type="number" id="sampler-cfg" class="input-base py-1.5" value="1" step="0.5">
                            </div>
                            <div>
                                <label class="label-base">Sampler</label>
                                <input type="text" id="sampler-name" class="input-base py-1.5" value="er_sde">
                            </div>
                            <div>
                                <label class="label-base">Scheduler</label>
                                <input type="text" id="sampler-scheduler" class="input-base py-1.5" value="simple">
                            </div>
                            <div>
                                <label class="label-base">Denoise</label>
                                <input type="number" id="sampler-denoise" class="input-base py-1.5" value="1" step="0.1" max="1">
                            </div>
                        </div>
                    </div>
                </section>

                <!-- LoRA -->
                <section>
                    <h3 class="font-bold text-slate-700 mb-2"><i class="fas fa-layer-group w-5"></i>LoRA (Node 30)</h3>
                    <div id="lora-container" class="space-y-2 border border-slate-200 rounded-lg p-2 bg-slate-50">
                        <!-- Populated by JS -->
                    </div>
                </section>
            </div>
        </div>

        <!-- Tab 6: Other (Control) -->
        <div id="tab-other" class="tab-pane h-full w-full hidden overflow-y-auto p-4 flex flex-col">
            <h2 class="text-xl font-bold mb-4 border-b pb-2">システム・実行</h2>
            
            <div class="space-y-4 mb-auto">
                <!-- Connection -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200">
                    <label class="label-base">ComfyUI Base URL</label>
                    <div class="flex gap-2">
                        <input type="text" id="comfy-url" class="input-base" value="http://127.0.0.1:8188">
                        <button id="btn-connect" class="bg-slate-200 px-4 rounded font-bold text-slate-700 hover:bg-slate-300 transition">更新</button>
                    </div>
                    <div class="mt-2 text-sm flex items-center gap-2">
                        <span>状態:</span>
                        <span id="status-indicator" class="w-3 h-3 rounded-full bg-slate-400"></span>
                        <span id="status-text" class="font-bold text-slate-600">未接続</span>
                    </div>
                </div>

                <!-- Loop Settings -->
                <div class="bg-slate-50 p-3 rounded-lg border border-slate-200 flex items-center justify-between">
                    <span class="font-bold text-sm">連続生成枚数</span>
                    <select id="loop-count" class="input-base w-auto py-1">
                        <option value="1">1枚</option>
                        <option value="4">4枚</option>
                        <option value="10">10枚</option>
                        <option value="-1">無制限</option>
                    </select>
                </div>
                
                <!-- Progress & Preview -->
                <div class="border border-slate-200 rounded-lg overflow-hidden flex flex-col h-64 bg-slate-100 relative">
                    <div id="live-preview-container" class="flex-1 flex items-center justify-center relative overflow-hidden bg-checkered">
                        <img id="live-preview-img" class="object-contain max-h-full max-w-full hidden">
                        <span id="preview-placeholder" class="text-slate-400 text-sm absolute">Preview</span>
                    </div>
                    <div class="h-10 bg-white border-t px-3 flex flex-col justify-center">
                        <div class="flex justify-between text-xs text-slate-500 mb-1">
                            <span id="progress-node">待機中...</span>
                            <span id="progress-percent">0%</span>
                        </div>
                        <div class="w-full bg-slate-200 rounded-full h-1.5">
                            <div id="progress-bar" class="bg-blue-500 h-1.5 rounded-full transition-all duration-200" style="width: 0%"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- Action Buttons -->
            <div class="mt-4 flex gap-3 pb-6">
                <button id="btn-stop" class="flex-1 py-4 bg-red-100 text-red-600 font-bold rounded-xl border border-red-200 hover:bg-red-200 active:scale-95 transition-transform disabled:opacity-50">
                    <i class="fas fa-stop mr-2"></i>停止
                </button>
                <button id="btn-generate" class="flex-[2] py-4 bg-blue-500 text-white font-bold rounded-xl shadow-lg shadow-blue-500/30 hover:bg-blue-600 active:scale-95 transition-transform disabled:opacity-50">
                    <i class="fas fa-play mr-2"></i>生成開始
                </button>
            </div>
        </div>

    </main>

    <!-- Bottom Navigation -->
    <nav class="bg-white border-t border-slate-200 fixed bottom-0 w-full z-40 pb-safe">
        <div class="flex justify-around items-center h-16">
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-timeline">
                <i class="fas fa-layer-group text-xl mb-1"></i>
                <span class="text-[10px] font-bold">タイムライン</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-prefix">
                <i class="fas fa-quote-left text-xl mb-1"></i>
                <span class="text-[10px] font-bold">プレフィックス</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-character">
                <i class="fas fa-user text-xl mb-1"></i>
                <span class="text-[10px] font-bold">キャラ</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-situation">
                <i class="fas fa-image text-xl mb-1"></i>
                <span class="text-[10px] font-bold">シチュ</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-model">
                <i class="fas fa-sliders text-xl mb-1"></i>
                <span class="text-[10px] font-bold">モデル</span>
            </button>
            <button class="nav-btn flex-1 flex flex-col items-center justify-center text-slate-400 hover:text-blue-500 data-[active=true]:text-blue-500 transition-colors" data-target="tab-other">
                <i class="fas fa-gear text-xl mb-1"></i>
                <span class="text-[10px] font-bold">その他</span>
            </button>
        </div>
    </nav>

    <script>
        // --- 1. Constants & Template ---
        
        // CSS specific hacks
        const style = document.createElement('style');
        style.innerHTML = `
            .pb-safe { padding-bottom: env(safe-area-inset-bottom, 0px); }
            .bg-checkered {
                background-image: linear-gradient(45deg, #e2e8f0 25%, transparent 25%), linear-gradient(-45deg, #e2e8f0 25%, transparent 25%), linear-gradient(45deg, transparent 75%, #e2e8f0 75%), linear-gradient(-45deg, transparent 75%, #e2e8f0 75%);
                background-size: 20px 20px;
                background-position: 0 0, 0 10px, 10px -10px, -10px 0px;
            }
        `;
        document.head.appendChild(style);

        // Adjust app height for mobile browsers
        const appHeight = () => document.documentElement.style.setProperty('--app-height', `${window.innerHeight}px`);
        window.addEventListener('resize', appHeight);
        appHeight();

        const WORKFLOW_TEMPLATE = {
            "1": {"inputs": {"vae_name": "qwen_image_vae.safetensors"}, "class_type": "VAELoader"},
            "2": {"inputs": {"clip_name": "qwen_3_06b_base.safetensors", "type": "stable_diffusion", "device": "default"}, "class_type": "CLIPLoader"},
            "3": {"inputs": {"samples": ["13", 0], "vae": ["1", 0]}, "class_type": "VAEDecode"},
            "4": {"inputs": {"model_name": "2x-AnimeSharpV4_Fast_RCAN_PU.safetensors"}, "class_type": "UpscaleModelLoader"},
            "5": {"inputs": {"unet_name": "anima-preview3-base.safetensors", "weight_dtype": "default"}, "class_type": "UNETLoader"},
            "7": {"inputs": {"upscale_model": ["4", 0], "image": ["3", 0]}, "class_type": "ImageUpscaleWithModel"},
            "8": {"inputs": {"filename_prefix": "MobileGen/_UI", "discord_target_index": 0, "images": ["7", 0]}, "class_type": "SaveWebpAndSendDiscord"},
            "9": {"inputs": {"width": 824, "height": 1216, "batch_size": 1}, "class_type": "EmptyLatentImage"},
            "10": {"inputs": {"text": ["15", 0], "clip": ["2", 0]}, "class_type": "CLIPTextEncode"},
            "11": {"inputs": {"images": ["7", 0]}, "class_type": "PreviewImage"},
            "12": {"inputs": {"text": "worst quality, low quality, score_1, score_2, score_3, artist name,english_text, ", "clip": ["2", 0]}, "class_type": "CLIPTextEncode"},
            "13": {"inputs": {"seed": 536, "steps": 8, "cfg": 1, "sampler_name": "er_sde", "scheduler": "simple", "denoise": 1, "model": ["30", 0], "positive": ["10", 0], "negative": ["12", 0], "latent_image": ["9", 0]}, "class_type": "KSampler"},
            "15": {"inputs": {"find1": "_", "replace1": " ", "find2": "score ", "replace2": "score_", "find3": "", "replace3": "", "text": ["26", 0]}, "class_type": "CR Text Replace"},
            "16": {"inputs": {"prompt": ["22", 0]}, "class_type": "PromptUtilCharacterTagFilter"},
            "19": {"inputs": {"separator": ",", "text1": ["29", 0], "text2": ["20", 0]}, "class_type": "CR Text Concatenate"},

            let timeout;
            return function executedFunction(...args) {

                clearTimeout(timeout);
                timeout = setTimeout(later, wait);
            };
        }

                return await res.json();

        };

        const setupAutocomplete = (inputId, dropdownId) => {
            const input = document.getElementById(inputId);
            const dropdown = document.getElementById(dropdownId);
            
            const handleInput = debounce(async (e) => {
                const val = input.value;
                const cursor = input.selectionStart;
                const textBefore = val.substring(0, cursor);
                const match = textBefore.match(/([^,]+)$/);
                
                if(!match || match[1].trim().length < 2) {
                    dropdown.style.display = 'none';
                    return;
                }
                
                const query = match[1].trim().replace(/\s/g, '_');
                const tags = await fetchDanbooruTags(query);
                
                if(tags.length === 0) {
                    dropdown.style.display = 'none';
                    return;
                }

                dropdown.innerHTML = '';
                tags.forEach(t => {
                    const div = document.createElement('div');
                    div.className = `autocomplete-item tag-cat-${t.category}`;
                    div.innerHTML = `<span>${t.name}</span><span class="text-slate-400 text-xs">${t.post_count}</span>`;
                    div.addEventListener('click', () => {
                        const beforeMatch = textBefore.substring(0, match.index);
                        const newText = beforeMatch + t.name + ', ' + val.substring(cursor);
                        input.value = newText;
                        input.focus();
                        dropdown.style.display = 'none';
                        updateStateFromInputs();
                    });
                    dropdown.appendChild(div);
                });
                dropdown.style.display = 'block';
            }, 300);

            input.addEventListener('input', handleInput);
            document.addEventListener('click', (e) => {
                if(!input.contains(e.target) && !dropdown.contains(e.target)) {

                        return;

                            if(state.status === 'generating' && msg.data.status.exec_info.queue_remaining === 0) {

                await new Promise(r => setTimeout(r, 500)); // wait a bit
            }

            updateStateFromInputs();
            const payload = getWorkflow();

            // Reset UI
            document.getElementById('progress-bar').style.width = `0%`;
            document.getElementById('progress-percent').textContent = `0%`;
            document.getElementById('progress-node').textContent = `開始準備中...`;
            document.getElementById('live-preview-img').classList.add('hidden');
            document.getElementById('preview-placeholder').classList.remove('hidden');

            try {
                updateStatus('generating');
                const res = await fetch(`${state.baseUrl}/prompt`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ prompt: payload.workflow, client_id: clientId })
                });

                if(!res.ok) {
                    const text = await res.text();
                    throw new Error(text);
                }

                const data = await res.json();
                state.currentPromptId = data.prompt_id;
                // Save meta with prompt id temporarily
                state._currentMeta = { ...payload.meta, prompt_id: data.prompt_id, time: Date.now() };

            } catch(e) {
                updateStatus('error', e.message);
                state.loop.active = false;
            }
        };

        const handleGenerationComplete = async () => {
            if(state.status !== 'generating' || !state.currentPromptId) return;
            
            updateStatus('connected');
            
            try {
                // Fetch history
                const res = await fetch(`${state.baseUrl}/history/${state.currentPromptId}`);
                const history = await res.json();
                const output = history[state.currentPromptId];
                
                if(output && output.outputs) {
                    // Find node 8 or any node with images
                    let images = [];
                    for (const nodeId in output.outputs) {
                        if (output.outputs[nodeId].images) {
                            images = images.concat(output.outputs[nodeId].images);
                        }
                    }

                    if(images.length > 0) {
                        images.forEach(img => {
                            const params = new URLSearchParams({ filename: img.filename, subfolder: img.subfolder, type: img.type });
                            const url = `${state.baseUrl}/view?${params.toString()}`;
                            state.timeline.push({ url: url, meta: state._currentMeta });
                        });
                        saveState();
                        renderTimeline();
                        
                        // Switch to timeline view visually if on main tab and loop is done
                        if(!state.loop.active) {
                             document.querySelector('[data-target="tab-timeline"]').click();
                        }
                    }
                }
            } catch(e) {
                console.error("Failed to fetch history", e);
            }

            state.currentPromptId = null;

            // Handle Loop
            if(state.loop.active) {
                state.loop.current++;
                if(state.loop.target === -1 || state.loop.current < state.loop.target) {
                    setTimeout(triggerGeneration, 1000); // Small delay before next
                } else {
                    state.loop.active = false;
                }
            }
        };

        const stopGeneration = async () => {
            state.loop.active = false;
            try {
                await fetch(`${state.baseUrl}/interrupt`, { method: 'POST' });
                updateStatus('connected', '停止しました');
            } catch(e) {
                updateStatus('error', '停止失敗');
            }
        };

        // Bind Action Buttons
        document.getElementById('btn-generate').addEventListener('click', () => {
            const countStr = document.getElementById('loop-count').value;
            state.loop = { active: countStr !== "1", target: parseInt(countStr), current: 0 };
            triggerGeneration();
        });

        document.getElementById('btn-stop').addEventListener('click', stopGeneration);

        // --- 7. Init ---
        loadState();
        updateInputsFromState();
        connectWS(); // Attempt initial connection

    </script>
</body>
</html>
