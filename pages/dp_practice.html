<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<meta name="description" content="アルゴリズムIの講義で扱うDPを、表を埋めながら練習するスマホ向けサイト。依存セルを可視化するヒント付き。">
<meta name="page:icon" content="fas fa-table-cells">
<meta name="page:color" content="#2563eb">
<title>DP Table Practice</title>
<style>
:root{color-scheme:light;--bg:#f7f8fb;--panel:#fff;--ink:#182033;--muted:#667085;--line:#e1e6ef;--accent:#2563eb;--accentSoft:#edf3ff;--hint:#d97706;--hintSoft:#fff7e6;--ok:#15803d;--okSoft:#edf9f0;--bad:#c2410c;--badSoft:#fff2eb;--fixed:#f0f3f7}
*{box-sizing:border-box}html,body{margin:0;background:var(--bg);color:var(--ink);font-family:ui-sans-serif,-apple-system,BlinkMacSystemFont,"Segoe UI","Noto Sans JP",sans-serif}body{min-height:100vh;padding-bottom:calc(76px + env(safe-area-inset-bottom));-webkit-tap-highlight-color:transparent}button,input,select{font:inherit}button{touch-action:manipulation}.app{width:min(100%,520px);margin:auto}
header{display:flex;align-items:center;justify-content:space-between;gap:8px;padding:12px 12px 8px}.brand h1{margin:0;font-size:17px;letter-spacing:-.02em}.brand p{display:none}.new{border:0;border-radius:10px;padding:9px 11px;background:var(--accent);color:#fff;font-size:13px;font-weight:800;white-space:nowrap}.controls{display:grid;grid-template-columns:minmax(0,1fr) 104px;gap:6px;padding:0 12px 8px}.control{width:100%;min-width:0;height:40px;border:1px solid var(--line);border-radius:10px;background:#fff;color:var(--ink);padding:0 10px;font-size:13px}
.sticky{position:sticky;top:0;z-index:20;padding:0 8px 7px;background:linear-gradient(var(--bg) 82%,rgba(247,248,251,0))}.info{overflow:hidden;border:1px solid var(--line);border-radius:13px;background:rgba(255,255,255,.98);box-shadow:0 3px 12px rgba(15,23,42,.05);backdrop-filter:blur(10px)}.infoRow{display:flex;gap:7px;align-items:flex-start;padding:7px 9px;border-bottom:1px solid var(--line)}.infoRow:last-child{border-bottom:0}.label{flex:0 0 32px;color:var(--muted);font-size:10px;font-weight:800;line-height:24px}.data{display:flex;min-width:0;flex:1;gap:5px;overflow-x:auto;scrollbar-width:none}.data::-webkit-scrollbar{display:none}.chip{flex:0 0 auto;border:1px solid var(--line);border-radius:8px;padding:4px 7px;background:#fafbfc;font-size:11px;white-space:nowrap}.formula{min-width:0;flex:1;font:11px/1.4 ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;overflow-wrap:anywhere}.activeLine{display:flex;min-width:0;gap:7px;align-items:center}.activeBadge{flex:0 0 auto;border-radius:7px;padding:3px 6px;background:var(--accentSoft);color:var(--accent);font:800 11px ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}.activeText{min-width:0;color:#344054;font-size:11px;line-height:1.35;overflow-wrap:anywhere}
main{padding:0 8px 20px}.head{display:flex;gap:8px;justify-content:space-between;align-items:center;padding:7px 2px}.head h2{margin:0;font-size:15px}.head p{display:none}.score{flex:0 0 auto;border:1px solid var(--line);border-radius:999px;background:#fff;padding:5px 8px;color:var(--muted);font-size:11px}.actions{display:grid;grid-template-columns:repeat(3,1fr);gap:5px;margin-bottom:7px}.action{height:36px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:11px;font-weight:800}.action.on{border-color:#f0b25f;background:var(--hintSoft);color:#8a4b00}
.shell{border:1px solid var(--line);border-radius:13px;background:#fff;padding:7px}.scroll{overflow-x:auto;overscroll-behavior-x:contain;padding:2px 0 4px;scrollbar-width:thin}.dp{border-collapse:separate;border-spacing:4px;width:max-content;margin:0 auto}.dp th{min-width:36px;height:24px;color:var(--muted);font-size:10px;text-align:center;white-space:nowrap}.dp th.row{min-width:40px;max-width:72px}.cell{min-width:40px;width:40px;height:40px;padding:0 3px;border:1px solid var(--line);border-radius:8px;background:#fff;color:var(--ink);font-size:13px;font-weight:800;text-align:center}.cell.target:active{transform:scale(.95)}.cell.active{border:2px solid var(--accent);background:var(--accentSoft)}.cell.fixed{background:var(--fixed);color:#475467}.cell.blocked{border-color:transparent;background:transparent;color:transparent;pointer-events:none}.cell.ok{border-color:#90d4a2;background:var(--okSoft);color:var(--ok)}.cell.bad{border-color:#efa07a;background:var(--badSoft);color:var(--bad)}.cell.dep{border-color:#efa631;background:var(--hintSoft);color:#8a4b00}.hintNote{min-height:31px;margin-top:6px;padding:7px 8px;border-radius:8px;background:#f8f9fb;color:var(--muted);font-size:10px;line-height:1.4}.hintNote.on{background:var(--hintSoft);color:#7c4700}
.refs{display:grid;gap:8px;margin-top:8px}.ref{border-top:1px solid var(--line);padding-top:7px}.refTitle{margin:0 0 4px;color:var(--muted);font-size:10px;font-weight:800}.miniWrap{overflow-x:auto}.mini{border-collapse:separate;border-spacing:2px;width:max-content;margin:auto}.mini th{min-width:26px;height:21px;color:var(--muted);font-size:9px}.mini td{min-width:28px;height:28px;border:1px solid var(--line);border-radius:6px;background:#fafbfc;text-align:center;font-size:10px;font-weight:700}.mini td.dep{border-color:#efa631;background:var(--hintSoft);color:#8a4b00}.done{display:none;margin-top:8px;border:1px solid #a8ddb7;border-radius:10px;padding:10px;background:var(--okSoft);color:#166534;text-align:center;font-size:12px;font-weight:800}.done.show{display:block}
.dock{position:fixed;left:50%;bottom:0;z-index:40;width:min(100%,520px);transform:translateX(-50%);padding:7px 8px calc(7px + env(safe-area-inset-bottom));border-top:1px solid var(--line);background:rgba(247,248,251,.96);backdrop-filter:blur(12px)}.dockInner{display:grid;grid-template-columns:auto minmax(0,1fr) 40px 58px;gap:5px;align-items:center}.dockLabel{max-width:70px;overflow:hidden;text-overflow:ellipsis;color:var(--muted);font-size:10px;white-space:nowrap}.answer{width:100%;min-width:0;height:42px;border:1px solid var(--line);border-radius:9px;background:#fff;padding:0 10px;color:var(--ink);font-size:17px;font-weight:800;outline:none}.answer:focus{border-color:var(--accent);box-shadow:0 0 0 2px var(--accentSoft)}.dockBtn{height:42px;border:1px solid var(--line);border-radius:9px;background:#fff;color:var(--ink);font-size:12px;font-weight:800}.dockBtn.primary{border-color:var(--accent);background:var(--accent);color:#fff}.toast{position:fixed;left:50%;bottom:calc(72px + env(safe-area-inset-bottom));z-index:50;max-width:calc(100% - 20px);transform:translate(-50%,10px);opacity:0;pointer-events:none;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;border-radius:999px;padding:8px 11px;background:#182033;color:#fff;font-size:11px;font-weight:800;transition:.16s}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:360px){header{padding-left:9px;padding-right:9px}.controls{padding-left:9px;padding-right:9px;grid-template-columns:minmax(0,1fr) 94px}.new{padding:8px 9px}.cell{min-width:37px;width:37px;height:37px}.dp{border-spacing:3px}.dockInner{grid-template-columns:minmax(0,1fr) 38px 54px}.dockLabel{display:none}}
</style>
</head>
<body>
<div class="app">
<header><div class="brand"><h1>DP Table Practice</h1><p>講義と同じ型を、数値を変えて反復練習</p></div><button id="newBtn" class="new" type="button">新しい問題</button></header>
<div class="controls">
<select id="type" class="control" aria-label="問題タイプ"><option value="random">ランダム出題</option><optgroup label="Note 2 DP"><option value="matrix">行列連鎖積</option><option value="knapsack">0-1 ナップサック</option><option value="lcs">最長共通部分文字列</option></optgroup><optgroup label="Note 5 グラフDP"><option value="apsp-step">全点間最短路 Wm</option><option value="apsp-double">全点間最短路 倍々</option><option value="floyd">Floyd-Warshall</option></optgroup></select>
<select id="difficulty" class="control" aria-label="問題サイズ"><option value="quiz">小テスト型</option><option value="short">短め</option></select>
</div>
<section class="sticky"><div class="info">
<div class="infoRow"><span class="label">データ</span><span id="data" class="data"></span></div>
<div class="infoRow"><span class="label">式</span><span id="formula" class="formula"></span></div>
<div class="infoRow"><div class="activeLine"><span id="activeBadge" class="activeBadge">セル未選択</span><span id="activeText" class="activeText">表の空欄をタップすると、そのマスの計算を表示します。</span></div></div>
</div></section>
<main>
<div class="head"><div><h2 id="title"></h2><p id="sub"></p></div><div id="score" class="score">0 / 0</div></div>
<div class="actions"><button id="hint" class="action" type="button">ヒント</button><button id="check" class="action" type="button">全体を採点</button><button id="clear" class="action" type="button">入力を消す</button></div>
<section class="shell"><div id="table" class="scroll"></div><div id="hintNote" class="hintNote">空欄を選び「ヒント」を押すと、参照するマスを色付けします。</div><div id="refs" class="refs"></div></section>
<div id="done" class="done">表が完成しました。新しい問題でもう一度練習できます。</div>
</main>
</div>
<div class="dock"><div class="dockInner"><span id="dockLabel" class="dockLabel">セル未選択</span><input id="answer" class="answer" inputmode="numeric" autocomplete="off" enterkeyhint="done" placeholder="答え" disabled><button id="inf" class="dockBtn" type="button" disabled>∞</button><button id="submit" class="dockBtn primary" type="button" disabled>確定</button></div></div>
<div id="toast" class="toast" role="status" aria-live="polite"></div>
<script>
(()=>{
'use strict';
const INF=1e9,$=id=>document.getElementById(id),key=(r,c)=>`${r},${c}`,fmt=v=>v>=INF/2?'∞':String(v),ri=(a,b)=>Math.floor(Math.random()*(b-a+1))+a,pick=a=>a[ri(0,a.length-1)];
const S={p:null,active:null,vals:new Map(),status:new Map(),hint:false};
const type=$('type'),difficulty=$('difficulty'),answer=$('answer');
function esc(s){return String(s).replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
function parse(s){s=String(s).trim();if(s==='∞'||/^inf(inity)?$/i.test(s))return INF;if(!/^-?\d+$/.test(s))return null;return Number(s)}
function toast(s){const e=$('toast');e.textContent=s;e.classList.add('show');clearTimeout(toast.t);toast.t=setTimeout(()=>e.classList.remove('show'),1100)}
function minPlus(A,B){const n=A.length,C=Array.from({length:n},()=>Array(n).fill(INF));for(let i=0;i<n;i++)for(let j=0;j<n;j++)for(let k=0;k<n;k++)C[i][j]=Math.min(C[i][j],A[i][k]+B[k][j]);return C}
function floyd(D,k0){const n=D.length,N=D.map(r=>r.slice());for(let i=0;i<n;i++)for(let j=0;j<n;j++)N[i][j]=Math.min(D[i][j],D[i][k0]+D[k0][j]);return N}
function graph(n){const W=Array.from({length:n},(_,i)=>Array.from({length:n},(_,j)=>i===j?0:INF));for(let i=0;i<n;i++){const j=(i+1)%n,w=ri(1,9);W[i][j]=W[j][i]=Math.min(W[i][j],w)}for(let i=0;i<n;i++)for(let j=i+1;j<n;j++)if(Math.random()<.42){const w=ri(2,12);W[i][j]=W[j][i]=Math.min(W[i][j],w)}return W}
function headers(n){return Array.from({length:n},(_,i)=>String(i+1))}function diag(n){return Array.from({length:n},(_,i)=>[i,i])}function offdiag(n){const a=[];for(let i=0;i<n;i++)for(let j=0;j<n;j++)if(i!==j)a.push([i,j]);return a}
function matrix(short){
 const n=short?3:4,p=Array.from({length:n+1},()=>pick([2,3,4,5,6,8,10,12])),d=Array.from({length:n},()=>Array(n).fill(INF));for(let i=0;i<n;i++)d[i][i]=0;
 for(let len=2;len<=n;len++)for(let i=0;i<=n-len;i++){const j=i+len-1;for(let k=i;k<j;k++)d[i][j]=Math.min(d[i][j],d[i][k]+d[k+1][j]+p[i]*p[k+1]*p[j+1])}
 const targets=[],blocked=[];for(let len=2;len<=n;len++)for(let i=0;i<=n-len;i++)targets.push([i,i+len-1]);for(let i=0;i<n;i++)for(let j=0;j<i;j++)blocked.push([i,j]);
 return{title:'行列連鎖積',sub:'m[i,j] の表を、対角線から右上へ埋めます。理解確認クイズと同じ型です。',formula:'m[i,j] = min(i≤k<j){ m[i,k] + m[k+1,j] + p[i-1]·p[k]·p[j] }',data:Array.from({length:n},(_,i)=>`A${i+1}: ${p[i]}×${p[i+1]}`),rows:headers(n),cols:headers(n),targets,fixed:diag(n),blocked,correct:(r,c)=>d[r][c],fixedVal:()=>0,label:(r,c)=>`m[${r+1},${c+1}]`,detail:(r,c)=>{const a=[];for(let k=r;k<c;k++)a.push(`k=${k+1}: m[${r+1},${k+1}] + m[${k+2},${c+1}] + ${p[r]}×${p[k+1]}×${p[c+1]}`);return a.join(' / ')},deps:(r,c)=>{const a=[];for(let k=r;k<c;k++){a.push(['main',r,k]);a.push(['main',k+1,c])}return a},refs:[]}
}
function knapsack(short){
 const n=short?3:4,W=short?ri(5,7):ri(8,11),w=[0],v=[0];for(let i=1;i<=n;i++){w.push(ri(1,4));v.push(ri(2,9))}const d=Array.from({length:n+1},()=>Array(W+1).fill(0));for(let i=1;i<=n;i++)for(let j=1;j<=W;j++)d[i][j]=j<w[i]?d[i-1][j]:Math.max(d[i-1][j],d[i-1][j-w[i]]+v[i]);
 const targets=[],fixed=[];for(let i=1;i<=n;i++)for(let j=1;j<=W;j++)targets.push([i,j]);for(let j=0;j<=W;j++)fixed.push([0,j]);for(let i=1;i<=n;i++)fixed.push([i,0]);
 return{title:'0-1 ナップサック',sub:'行 i は「i番目まで選択可能」、列 j は容量 j。上の行だけを使って埋めます。',formula:'V(i,j) = max( V(i-1,j), V(i-1,j-wᵢ)+vᵢ )　※ j<wᵢ なら V(i-1,j)',data:[`W=${W}`,...Array.from({length:n},(_,i)=>`物${i+1}: w=${w[i+1]}, v=${v[i+1]}`)],rows:Array.from({length:n+1},(_,i)=>`${i}番目まで`),cols:Array.from({length:W+1},(_,i)=>String(i)),targets,fixed,blocked:[],correct:(r,c)=>d[r][c],fixedVal:()=>0,label:(r,c)=>`V(${r},${c})`,detail:(r,c)=>c<w[r]?`w${r}=${w[r]} > j=${c} → V(${r-1},${c}) を見る`:`max( V(${r-1},${c}), V(${r-1},${c-w[r]}) + ${v[r]} )`,deps:(r,c)=>c<w[r]?[['main',r-1,c]]:[['main',r-1,c],['main',r-1,c-w[r]]],refs:[]}
}
function lcs(short){
 const m=short?5:7,n=short?5:6,A=['A','B','C','D'],X=Array.from({length:m},()=>pick(A)),Y=Array.from({length:n},()=>pick(A)),d=Array.from({length:m+1},()=>Array(n+1).fill(0));for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)d[i][j]=X[i-1]===Y[j-1]?d[i-1][j-1]+1:Math.max(d[i-1][j],d[i][j-1]);
 const targets=[],fixed=[];for(let i=1;i<=m;i++)for(let j=1;j<=n;j++)targets.push([i,j]);for(let j=0;j<=n;j++)fixed.push([0,j]);for(let i=1;i<=m;i++)fixed.push([i,0]);
 return{title:'最長共通部分文字列 LCS',sub:'文字が同じなら左上、違えば上と左を見る、という講義の表です。',formula:'xᵢ=yⱼ: c[i,j]=c[i-1,j-1]+1　/　xᵢ≠yⱼ: c[i,j]=max(c[i-1,j], c[i,j-1])',data:[`X=${X.join('')}`,`Y=${Y.join('')}`],rows:['0',...X.map((x,i)=>`${i+1}:${x}`)],cols:['0',...Y.map((y,i)=>`${i+1}:${y}`)],targets,fixed,blocked:[],correct:(r,c)=>d[r][c],fixedVal:()=>0,label:(r,c)=>`c[${r},${c}]`,detail:(r,c)=>X[r-1]===Y[c-1]?`x${r}=${X[r-1]} と y${c}=${Y[c-1]} は同じ → 左上 c[${r-1},${c-1}] + 1`:`x${r}=${X[r-1]} と y${c}=${Y[c-1]} は違う → 上 c[${r-1},${c}] と左 c[${r},${c-1}] の大きい方`,deps:(r,c)=>X[r-1]===Y[c-1]?[['main',r-1,c-1]]:[['main',r-1,c],['main',r,c-1]],refs:[]}
}
function apspStep(short){
 const n=short?3:4,W1=graph(n),m=short?2:ri(2,3);let prev=W1.map(r=>r.slice());for(let t=2;t<=m-1;t++)prev=minPlus(W1,prev);const out=minPlus(W1,prev);
 return{title:`全点間最短路 W${m}`,sub:`W1 と W${m-1} から、高々 ${m} 辺の最短距離表 W${m} を作ります。`,formula:`e^${m}[i,j] = min( e^${m-1}[i,j], minₖ{ e¹[i,k] + e^${m-1}[k,j] } )`,data:[`n=${n}`,`W1 → W${m}`],rows:headers(n),cols:headers(n),targets:offdiag(n),fixed:diag(n),blocked:[],correct:(r,c)=>out[r][c],fixedVal:()=>0,label:(r,c)=>`e^${m}[${r+1},${c+1}]`,detail:(r,c)=>`W1 の ${r+1} 行目と W${m-1} の ${c+1} 列目を、同じ k で組にして足し、その最小を見る。`,deps:(r,c)=>{const a=[['b',r,c]];for(let k=0;k<n;k++){a.push(['a',r,k]);a.push(['b',k,c])}return a},refs:[{id:'a',title:'W1',matrix:W1},{id:'b',title:`W${m-1}`,matrix:prev}]}
}
function apspDouble(short){
 const n=short?3:4,W1=graph(n),m=short?1:(Math.random()<.5?1:2),base=m===1?W1:minPlus(W1,W1),out=minPlus(base,base);
 return{title:`全点間最短路 W${2*m}`,sub:`W${m} と W${m} を組み合わせ、W1→W2→W4… と進む方法です。`,formula:`e^${2*m}[i,j] = minₖ{ e^${m}[i,k] + e^${m}[k,j] }`,data:[`n=${n}`,`W${m} → W${2*m}`],rows:headers(n),cols:headers(n),targets:offdiag(n),fixed:diag(n),blocked:[],correct:(r,c)=>out[r][c],fixedVal:()=>0,label:(r,c)=>`e^${2*m}[${r+1},${c+1}]`,detail:(r,c)=>`W${m} の ${r+1} 行目と ${c+1} 列目を、同じ k で組にして足した値の最小。`,deps:(r,c)=>{const a=[];for(let k=0;k<n;k++){a.push(['a',r,k]);a.push(['a',k,c])}return a},refs:[{id:'a',title:`W${m}`,matrix:base}]}
}
function floydGen(short){
 const n=short?3:4,W=graph(n),kh=ri(1,n);let prev=W.map(r=>r.slice());for(let t=0;t<kh-1;t++)prev=floyd(prev,t);const out=floyd(prev,kh-1);
 return{title:`Floyd-Warshall D${kh}`,sub:`D${kh-1} から、点 ${kh} を新たに中継点として許した D${kh} を作ります。`,formula:`e^${kh}[i,j] = min( e^${kh-1}[i,j], e^${kh-1}[i,${kh}] + e^${kh-1}[${kh},j] )`,data:[`n=${n}`,`中継点 k=${kh}`],rows:headers(n),cols:headers(n),targets:offdiag(n),fixed:diag(n),blocked:[],correct:(r,c)=>out[r][c],fixedVal:()=>0,label:(r,c)=>`e^${kh}[${r+1},${c+1}]`,detail:(r,c)=>`直接 e[${r+1},${c+1}] と、点 ${kh} 経由 e[${r+1},${kh}] + e[${kh},${c+1}] を比較。`,deps:(r,c)=>[['a',r,c],['a',r,kh-1],['a',kh-1,c]],refs:[{id:'a',title:`D${kh-1}`,matrix:prev}]}
}
const gens={matrix,knapsack,lcs,'apsp-step':apspStep,'apsp-double':apspDouble,floyd:floydGen};
function has(list,r,c){return list.some(x=>x[0]===r&&x[1]===c)}
function choose(){return type.value==='random'?pick(Object.keys(gens)):type.value}
function newProblem(){S.p=gens[choose()](difficulty.value==='short');S.active=null;S.vals.clear();S.status.clear();S.hint=false;$('hint').classList.remove('on');$('done').classList.remove('show');render();selectFirst()}
function render(){const p=S.p;$('title').textContent=p.title;$('sub').textContent=p.sub;$('formula').textContent=p.formula;$('data').innerHTML=p.data.map(x=>`<span class="chip">${esc(x)}</span>`).join('');renderTable();renderRefs();renderActive();score()}
function renderTable(){const p=S.p;let h='<table class="dp"><thead><tr><th></th>'+p.cols.map(x=>`<th>${esc(x)}</th>`).join('')+'</tr></thead><tbody>';for(let r=0;r<p.rows.length;r++){h+=`<tr><th class="row">${esc(p.rows[r])}</th>`;for(let c=0;c<p.cols.length;c++){const k=key(r,c),blocked=has(p.blocked,r,c),fixed=has(p.fixed,r,c),target=has(p.targets,r,c);let cls='cell'+(blocked?' blocked':fixed?' fixed':target?' target':'')+(S.active===k?' active':'')+(S.status.get(k)?` ${S.status.get(k)}`:'');const v=fixed?p.fixedVal(r,c):S.vals.get(k),txt=blocked?'':v==null?'·':fmt(v);h+=`<td><button type="button" class="${cls}" data-r="${r}" data-c="${c}" ${blocked||fixed||!target?'disabled':''}>${txt}</button></td>`}h+='</tr>'}h+='</tbody></table>';$('table').innerHTML=h;$('table').querySelectorAll('.cell.target').forEach(b=>b.addEventListener('click',()=>select(Number(b.dataset.r),Number(b.dataset.c))));applyHint()}
function renderRefs(){const refs=S.p.refs;if(!refs.length){$('refs').innerHTML='';return}$('refs').innerHTML=refs.map(ref=>{const n=ref.matrix.length;let h=`<div class="ref"><p class="refTitle">参照表 ${esc(ref.title)}</p><div class="miniWrap"><table class="mini"><thead><tr><th></th>`;for(let j=0;j<n;j++)h+=`<th>${j+1}</th>`;h+='</tr></thead><tbody>';for(let i=0;i<n;i++){h+=`<tr><th>${i+1}</th>`;for(let j=0;j<n;j++)h+=`<td data-ref="${ref.id}" data-r="${i}" data-c="${j}">${fmt(ref.matrix[i][j])}</td>`;h+='</tr>'}return h+'</tbody></table></div></div>'}).join('');applyHint()}
function renderActive(){const on=!!S.active;answer.disabled=!on;$('inf').disabled=!on;$('submit').disabled=!on;if(!on){$('activeBadge').textContent='セル未選択';$('activeText').textContent='表の空欄をタップすると、そのマスの計算を表示します。';$('dockLabel').textContent='セル未選択';answer.value='';return}const [r,c]=S.active.split(',').map(Number),p=S.p,l=p.label(r,c);$('activeBadge').textContent=l;$('activeText').textContent=p.detail(r,c);$('dockLabel').textContent=l;const v=S.vals.get(S.active);answer.value=v==null?'':fmt(v)}
function select(r,c){S.active=key(r,c);S.hint=false;$('hint').classList.remove('on');renderTable();renderRefs();renderActive();$('hintNote').className='hintNote';$('hintNote').textContent='「ヒント」を押すと、このマスを計算するときに参照する場所を色付けします。'}
function selectFirst(){const x=S.p.targets.find(([r,c])=>S.status.get(key(r,c))!=='ok');if(x)select(x[0],x[1])}
function applyHint(){document.querySelectorAll('.cell.dep,.mini td.dep').forEach(e=>e.classList.remove('dep'));if(!S.hint||!S.active)return;const [r,c]=S.active.split(',').map(Number);for(const [where,rr,cc] of S.p.deps(r,c)){const q=where==='main'?`.cell[data-r="${rr}"][data-c="${cc}"]`:`.mini td[data-ref="${where}"][data-r="${rr}"][data-c="${cc}"]`,e=document.querySelector(q);if(e)e.classList.add('dep')}}
function toggleHint(){if(!S.active)selectFirst();if(!S.active)return;S.hint=!S.hint;$('hint').classList.toggle('on',S.hint);applyHint();if(S.hint){const [r,c]=S.active.split(',').map(Number);$('hintNote').className='hintNote on';$('hintNote').textContent=S.p.detail(r,c)}else{$('hintNote').className='hintNote';$('hintNote').textContent='「ヒント」を押すと、このマスを計算するときに参照する場所を色付けします。'}}
function submit(){if(!S.active)return;const v=parse(answer.value);if(v==null){toast('整数か ∞ を入力してください');return}const [r,c]=S.active.split(',').map(Number),correct=S.p.correct(r,c),old=S.active;S.vals.set(old,v);if(v===correct){S.status.set(old,'ok');toast('正解');if(complete()){$('done').classList.add('show');S.active=null;renderTable();renderActive();score();return}const idx=S.p.targets.findIndex(x=>key(x[0],x[1])===old);let next=null;for(let s=1;s<=S.p.targets.length;s++){const x=S.p.targets[(idx+s)%S.p.targets.length];if(S.status.get(key(x[0],x[1]))!=='ok'){next=x;break}}if(next)select(next[0],next[1])}else{S.status.set(old,'bad');toast('違います。ヒントで参照セルを確認');renderTable();score()}}
function checkAll(){let filled=0,wrong=0;for(const [r,c] of S.p.targets){const k=key(r,c);if(!S.vals.has(k))continue;filled++;if(S.vals.get(k)===S.p.correct(r,c))S.status.set(k,'ok');else{S.status.set(k,'bad');wrong++}}renderTable();score();if(!filled)toast('まだ入力がありません');else if(wrong)toast(`${wrong} マスを見直してください`);else if(complete()){$('done').classList.add('show');toast('表が完成しました')}else toast('入力済みのマスは合っています')}
function clearAll(){S.vals.clear();S.status.clear();S.active=null;S.hint=false;$('hint').classList.remove('on');$('done').classList.remove('show');render();selectFirst();toast('入力を消しました')}
function score(){let ok=0;for(const [r,c] of S.p.targets)if(S.status.get(key(r,c))==='ok')ok++;$('score').textContent=`${ok} / ${S.p.targets.length}`}
function complete(){return S.p.targets.every(([r,c])=>S.status.get(key(r,c))==='ok')}
$('newBtn').addEventListener('click',newProblem);type.addEventListener('change',newProblem);difficulty.addEventListener('change',newProblem);$('hint').addEventListener('click',toggleHint);$('check').addEventListener('click',checkAll);$('clear').addEventListener('click',clearAll);$('submit').addEventListener('click',submit);$('inf').addEventListener('click',()=>{if(!answer.disabled){answer.value='∞';answer.focus()}});answer.addEventListener('keydown',e=>{if(e.key==='Enter')submit()});answer.addEventListener('focus',()=>answer.select());newProblem();
})();
</script>
</body>
</html>
