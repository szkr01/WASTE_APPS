<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="description" content="アルゴリズムIの講義で扱うDPを、表を埋めながら練習するスマホ向けサイト。依存セルを可視化するヒント付き。">
  <meta name="page:icon" content="fas fa-table-cells">
  <meta name="page:color" content="#2563eb">
  <title>DP Table Practice</title>
  <style>
    :root {
      color-scheme: light;
      --bg: #f3f6fb;
      --panel: #ffffff;
      --ink: #172033;
      --muted: #64748b;
      --line: #dbe3ef;
      --accent: #2563eb;
      --accent-soft: #e8f0ff;
      --hint: #f59e0b;
      --hint-soft: #fff4d7;
      --ok: #15803d;
      --ok-soft: #eaf8ef;
      --bad: #c2410c;
      --bad-soft: #fff0e8;
      --fixed: #eef2f7;
      --shadow: 0 8px 30px rgba(15, 23, 42, 0.08);
      --radius: 18px;
    }
    * { box-sizing: border-box; }
    html { background: var(--bg); }
    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--ink);
      font-family: ui-sans-serif, -apple-system, BlinkMacSystemFont, "Segoe UI", "Noto Sans JP", sans-serif;
      -webkit-tap-highlight-color: transparent;
      padding-bottom: calc(86px + env(safe-area-inset-bottom));
    }
    button, input, select { font: inherit; }
    button { touch-action: manipulation; }
    .app { width: min(100%, 760px); margin: 0 auto; }
    .topbar {
      padding: 14px 14px 10px;
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: space-between;
    }
    .brand { min-width: 0; }
    .brand h1 { margin: 0; font-size: 19px; line-height: 1.2; letter-spacing: -0.02em; }
    .brand p { margin: 3px 0 0; color: var(--muted); font-size: 12px; }
    .new-btn {
      border: 0;
      border-radius: 13px;
      padding: 10px 13px;
      background: var(--accent);
      color: white;
      font-weight: 700;
      white-space: nowrap;
    }
    .controls {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 112px;
      gap: 8px;
      padding: 0 14px 10px;
    }
    .control {
      width: 100%;
      min-width: 0;
      border: 1px solid var(--line);
      border-radius: 13px;
      background: var(--panel);
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }
    .sticky-info {
      position: sticky;
      top: 0;
      z-index: 20;
      padding: 0 10px 9px;
      background: linear-gradient(var(--bg) 78%, rgba(243, 246, 251, 0));
    }
    .info-card {
      background: rgba(255,255,255,0.97);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      backdrop-filter: blur(10px);
    }
    .info-row {
      padding: 10px 12px;
      border-bottom: 1px solid var(--line);
    }
    .info-row:last-child { border-bottom: 0; }
    .row-label {
      display: inline-block;
      min-width: 44px;
      margin-right: 6px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      vertical-align: top;
      padding-top: 2px;
    }
    .formula {
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 13px;
      line-height: 1.5;
      overflow-wrap: anywhere;
    }
    .data-strip {
      display: inline-flex;
      max-width: calc(100% - 56px);
      gap: 6px;
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: none;
      vertical-align: top;
      padding-bottom: 2px;
    }
    .data-strip::-webkit-scrollbar { display: none; }
    .chip {
      flex: 0 0 auto;
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 5px 8px;
      background: #f8fafc;
      font-size: 12px;
      white-space: nowrap;
    }
    .active-line {
      display: flex;
      gap: 8px;
      align-items: center;
      min-width: 0;
    }
    .active-cell {
      flex: 0 0 auto;
      border-radius: 9px;
      background: var(--accent-soft);
      color: var(--accent);
      padding: 4px 7px;
      font: 800 12px ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }
    .active-detail {
      min-width: 0;
      font-size: 12px;
      line-height: 1.45;
      overflow-wrap: anywhere;
    }
    .main { padding: 3px 10px 24px; }
    .problem-head {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
      padding: 8px 4px 10px;
    }
    .problem-title { margin: 0; font-size: 17px; line-height: 1.3; }
    .problem-sub { margin: 4px 0 0; color: var(--muted); font-size: 12px; line-height: 1.5; }
    .score {
      flex: 0 0 auto;
      border-radius: 12px;
      background: var(--panel);
      border: 1px solid var(--line);
      padding: 7px 9px;
      font-size: 12px;
      white-space: nowrap;
    }
    .actions {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 7px;
      margin: 0 0 10px;
    }
    .action-btn {
      min-height: 42px;
      border-radius: 13px;
      border: 1px solid var(--line);
      background: var(--panel);
      color: var(--ink);
      font-weight: 700;
      font-size: 13px;
    }
    .action-btn.hint-on { border-color: var(--hint); background: var(--hint-soft); color: #92400e; }
    .table-shell {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 10px;
      overflow: hidden;
    }
    .table-scroller {
      overflow-x: auto;
      overscroll-behavior-x: contain;
      scrollbar-width: thin;
      padding-bottom: 5px;
    }
    table.dp-table {
      border-collapse: separate;
      border-spacing: 4px;
      margin: 0 auto;
      width: max-content;
      min-width: 100%;
    }
    .dp-table th {
      min-width: 42px;
      height: 32px;
      color: var(--muted);
      font-size: 11px;
      font-weight: 800;
      text-align: center;
      white-space: nowrap;
    }
    .dp-table th.row-head { min-width: 58px; max-width: 82px; }
    .cell {
      min-width: 43px;
      height: 43px;
      padding: 0 4px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
      text-align: center;
      transition: background 120ms ease, border-color 120ms ease, transform 120ms ease;
    }
    .cell:active { transform: scale(0.96); }
    .cell.target.active { border: 2px solid var(--accent); background: var(--accent-soft); }
    .cell.fixed { background: var(--fixed); color: #475569; }
    .cell.blocked { border-color: transparent; background: transparent; color: transparent; pointer-events: none; }
    .cell.ok { background: var(--ok-soft); border-color: #86d39d; color: var(--ok); }
    .cell.bad { background: var(--bad-soft); border-color: #f3a37b; color: var(--bad); }
    .cell.dep { background: var(--hint-soft); border-color: var(--hint); color: #92400e; }
    .cell.dep.active { box-shadow: inset 0 0 0 2px var(--accent); }
    .hint-note {
      min-height: 36px;
      margin-top: 9px;
      padding: 8px 10px;
      border-radius: 12px;
      background: #f8fafc;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.5;
    }
    .hint-note.visible { background: var(--hint-soft); color: #7c4a03; }
    .refs { margin-top: 12px; display: grid; gap: 10px; }
    .ref-card { border-top: 1px solid var(--line); padding-top: 10px; }
    .ref-title { margin: 0 0 6px; font-size: 12px; color: var(--muted); font-weight: 800; }
    .mini-wrap { overflow-x: auto; }
    .mini-grid { border-collapse: separate; border-spacing: 3px; width: max-content; }
    .mini-grid th { min-width: 31px; height: 25px; font-size: 10px; color: var(--muted); text-align: center; }
    .mini-grid td {
      min-width: 31px;
      height: 31px;
      border: 1px solid var(--line);
      border-radius: 7px;
      background: #f8fafc;
      text-align: center;
      font-size: 11px;
      font-weight: 700;
    }
    .mini-grid td.dep { background: var(--hint-soft); border-color: var(--hint); color: #92400e; }
    .answer-dock {
      position: fixed;
      left: 50%;
      bottom: 0;
      z-index: 40;
      width: min(100%, 760px);
      transform: translateX(-50%);
      padding: 8px 10px calc(8px + env(safe-area-inset-bottom));
      background: rgba(243,246,251,0.96);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--line);
    }
    .answer-inner {
      display: grid;
      grid-template-columns: auto minmax(0, 1fr) auto auto;
      gap: 7px;
      align-items: center;
    }
    .answer-label {
      color: var(--muted);
      font-size: 11px;
      white-space: nowrap;
    }
    #answerInput {
      width: 100%;
      min-width: 0;
      height: 45px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      padding: 0 12px;
      font-size: 18px;
      font-weight: 800;
      outline: none;
    }
    #answerInput:focus { border-color: var(--accent); box-shadow: 0 0 0 3px var(--accent-soft); }
    .dock-btn {
      height: 45px;
      min-width: 45px;
      border: 1px solid var(--line);
      border-radius: 12px;
      background: #fff;
      color: var(--ink);
      font-weight: 800;
    }
    .dock-btn.primary { background: var(--accent); border-color: var(--accent); color: white; padding: 0 14px; }
    .toast {
      position: fixed;
      left: 50%;
      bottom: calc(82px + env(safe-area-inset-bottom));
      z-index: 50;
      transform: translate(-50%, 14px);
      opacity: 0;
      pointer-events: none;
      border-radius: 999px;
      padding: 9px 13px;
      background: #172033;
      color: white;
      font-size: 12px;
      font-weight: 700;
      transition: all 180ms ease;
      white-space: nowrap;
      max-width: calc(100% - 24px);
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .toast.show { opacity: 1; transform: translate(-50%, 0); }
    .done {
      margin-top: 12px;
      border-radius: var(--radius);
      padding: 14px;
      background: var(--ok-soft);
      border: 1px solid #a7ddb7;
      color: #166534;
      text-align: center;
      font-weight: 800;
      display: none;
    }
    .done.show { display: block; }
    @media (min-width: 640px) {
      .topbar { padding-top: 18px; }
      .sticky-info { padding-left: 14px; padding-right: 14px; }
      .main { padding-left: 14px; padding-right: 14px; }
      .refs { grid-template-columns: repeat(2, minmax(0, 1fr)); }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand">
        <h1>DP Table Practice</h1>
        <p>講義と同じ形の表を、数値を変えて反復練習</p>
      </div>
      <button id="newBtn" class="new-btn" type="button">新しい問題</button>
    </header>

    <div class="controls">
      <select id="typeSelect" class="control" aria-label="問題タイプ">
        <option value="random">ランダム出題</option>
        <optgroup label="Note 2 DP">
          <option value="matrix">行列連鎖積</option>
          <option value="knapsack">0-1 ナップサック</option>
          <option value="lcs">最長共通部分文字列</option>
        </optgroup>
        <optgroup label="Note 5 グラフDP">
          <option value="apsp-step">全点間最短路 Wm</option>
          <option value="apsp-double">全点間最短路 倍々</option>
          <option value="floyd">Floyd-Warshall</option>
        </optgroup>
      </select>
      <select id="difficultySelect" class="control" aria-label="問題サイズ">
        <option value="quiz">小テスト型</option>
        <option value="short">短め</option>
      </select>
    </div>

    <section class="sticky-info" aria-label="計算式と問題データ">
      <div class="info-card">
        <div class="info-row"><span class="row-label">データ</span><span id="dataStrip" class="data-strip"></span></div>
        <div class="info-row"><span class="row-label">式</span><span id="formula" class="formula"></span></div>
        <div class="info-row">
          <div class="active-line">
            <span id="activeCell" class="active-cell">セル未選択</span>
            <span id="activeDetail" class="active-detail">表の空欄をタップすると、そのマスの式を表示します。</span>
          </div>
        </div>
      </div>
    </section>

    <main class="main">
      <div class="problem-head">
        <div>
          <h2 id="problemTitle" class="problem-title"></h2>
          <p id="problemSub" class="problem-sub"></p>
        </div>
        <div id="score" class="score">0 / 0</div>
      </div>

      <div class="actions">
        <button id="hintBtn" class="action-btn" type="button">ヒント</button>
        <button id="checkAllBtn" class="action-btn" type="button">全体を採点</button>
        <button id="clearBtn" class="action-btn" type="button">入力を消す</button>
      </div>

      <section class="table-shell">
        <div id="tableScroller" class="table-scroller"></div>
        <div id="hintNote" class="hint-note">空欄を選ぶと、ヒントで参照するマスを色付けできます。</div>
        <div id="refs" class="refs"></div>
      </section>
      <div id="done" class="done">表が完成しました。新しい問題で同じ型をもう一度練習できます。</div>
    </main>
  </div>

  <div class="answer-dock">
    <div class="answer-inner">
      <span id="dockLabel" class="answer-label">セル未選択</span>
      <input id="answerInput" inputmode="numeric" autocomplete="off" enterkeyhint="done" aria-label="選択セルの答え" placeholder="答え" disabled>
      <button id="infBtn" class="dock-btn" type="button" aria-label="無限大を入力" disabled>∞</button>
      <button id="submitBtn" class="dock-btn primary" type="button" disabled>確定</button>
    </div>
  </div>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>

<script>
(() => {
  'use strict';

  const INF = 1e9;
  const $ = (id) => document.getElementById(id);
  const state = {
    type: 'matrix',
    problem: null,
    activeKey: null,
    values: new Map(),
    status: new Map(),
    hint: false,
    misses: 0
  };

  const typeSelect = $('typeSelect');
  const difficultySelect = $('difficultySelect');
  const answerInput = $('answerInput');

  const randInt = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const pick = (arr) => arr[randInt(0, arr.length - 1)];
  const keyOf = (r, c) => `${r},${c}`;
  const fmt = (v) => v >= INF / 2 ? '∞' : String(v);
  const parseAnswer = (s) => {
    const t = String(s).trim();
    if (t === '∞' || t.toLowerCase() === 'inf' || t.toLowerCase() === 'infinity') return INF;
    if (!/^-?\d+$/.test(t)) return null;
    return Number(t);
  };

  function toast(message) {
    const el = $('toast');
    el.textContent = message;
    el.classList.add('show');
    clearTimeout(toast.timer);
    toast.timer = setTimeout(() => el.classList.remove('show'), 1200);
  }

  function minPlus(A, B) {
    const n = A.length;
    const C = Array.from({ length: n }, () => Array(n).fill(INF));
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) {
        let best = INF;
        for (let k = 0; k < n; k++) best = Math.min(best, A[i][k] + B[k][j]);
        C[i][j] = best;
      }
    }
    return C;
  }

  function floydStep(D, k) {
    const n = D.length;
    const next = D.map(row => row.slice());
    for (let i = 0; i < n; i++) {
      for (let j = 0; j < n; j++) next[i][j] = Math.min(D[i][j], D[i][k] + D[k][j]);
    }
    return next;
  }

  function makeGraphMatrix(n) {
    const W = Array.from({ length: n }, (_, i) => Array.from({ length: n }, (_, j) => i === j ? 0 : INF));
    for (let i = 0; i < n; i++) {
      const j = (i + 1) % n;
      const w = randInt(1, 9);
      W[i][j] = Math.min(W[i][j], w);
      W[j][i] = Math.min(W[j][i], w);
    }
    for (let i = 0; i < n; i++) {
      for (let j = i + 1; j < n; j++) {
        if (Math.random() < 0.45) {
          const w = randInt(2, 12);
          W[i][j] = Math.min(W[i][j], w);
          W[j][i] = Math.min(W[j][i], w);
        }
      }
    }
    return W;
  }

  function generateMatrixChain(short) {
    const n = short ? 3 : 4;
    const dimsPool = [2, 3, 4, 5, 6, 8, 10, 12];
    const p = Array.from({ length: n + 1 }, () => pick(dimsPool));
    const dp = Array.from({ length: n + 1 }, () => Array(n + 1).fill(INF));
    for (let i = 1; i <= n; i++) dp[i][i] = 0;
    for (let len = 2; len <= n; len++) {
      for (let i = 1; i <= n - len + 1; i++) {
        const j = i + len - 1;
        for (let k = i; k < j; k++) dp[i][j] = Math.min(dp[i][j], dp[i][k] + dp[k + 1][j] + p[i - 1] * p[k] * p[j]);
      }
    }
    const targets = [];
    for (let len = 2; len <= n; len++) for (let i = 1; i <= n - len + 1; i++) targets.push([i, i + len - 1]);
    return {
      kind: 'matrix',
      title: '行列連鎖積',
      sub: 'm[i,j] の表を、対角線から右上へ埋めます。講義の理解確認クイズと同じ型です。',
      formula: 'm[i,j] = min(i≤k<j){ m[i,k] + m[k+1,j] + p[i-1]·p[k]·p[j] }',
      data: Array.from({ length: n }, (_, i) => `A${i + 1}: ${p[i]}×${p[i + 1]}`),
      rowHeaders: Array.from({ length: n }, (_, i) => `i=${i + 1}`),
      colHeaders: Array.from({ length: n }, (_, i) => `j=${i + 1}`),
      targets,
      fixed: Array.from({ length: n }, (_, i) => [i + 1, i + 1]),
      blocked: (() => { const a=[]; for(let i=1;i<=n;i++) for(let j=1;j<i;j++) a.push([i,j]); return a; })(),
      correct: (r, c) => dp[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `m[${r},${c}]`,
      activeDetail: (r, c) => {
        const parts = [];
        for (let k = r; k < c; k++) parts.push(`k=${k}: m[${r},${k}] + m[${k + 1},${c}] + ${p[r - 1]}×${p[k]}×${p[c]}`);
        return parts.join(' / ');
      },
      deps: (r, c) => {
        const a = [];
        for (let k = r; k < c; k++) { a.push(['main', r, k]); a.push(['main', k + 1, c]); }
        return a;
      },
      refs: []
    };
  }

  function generateKnapsack(short) {
    const n = short ? 3 : 4;
    const W = short ? randInt(5, 7) : randInt(8, 11);
    const w = [0], v = [0];
    for (let i = 1; i <= n; i++) { w.push(randInt(1, 4)); v.push(randInt(2, 9)); }
    const dp = Array.from({ length: n + 1 }, () => Array(W + 1).fill(0));
    for (let i = 1; i <= n; i++) {
      for (let j = 1; j <= W; j++) dp[i][j] = j < w[i] ? dp[i - 1][j] : Math.max(dp[i - 1][j], dp[i - 1][j - w[i]] + v[i]);
    }
    const targets = [];
    for (let i = 1; i <= n; i++) for (let j = 1; j <= W; j++) targets.push([i, j]);
    const fixed = [];
    for (let j = 0; j <= W; j++) fixed.push([0, j]);
    for (let i = 1; i <= n; i++) fixed.push([i, 0]);
    return {
      kind: 'knapsack',
      title: '0-1 ナップサック',
      sub: '行 i は「i番目まで選択可能」、列 j は「容量 j」。上の行だけを使って埋めます。',
      formula: 'V(i,j) = max( V(i-1,j), V(i-1,j-wᵢ)+vᵢ )　※ j<wᵢ なら V(i-1,j)',
      data: [`W=${W}`].concat(Array.from({ length: n }, (_, i) => `物${i + 1}: w=${w[i + 1]}, v=${v[i + 1]}`)),
      rowHeaders: Array.from({ length: n + 1 }, (_, i) => `${i}番目まで`),
      colHeaders: Array.from({ length: W + 1 }, (_, j) => String(j)),
      targets,
      fixed,
      blocked: [],
      correct: (r, c) => dp[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `V(${r},${c})`,
      activeDetail: (r, c) => c < w[r]
        ? `w${r}=${w[r]} > j=${c} なので V(${r - 1},${c}) を見る`
        : `max( V(${r - 1},${c}), V(${r - 1},${c - w[r]}) + ${v[r]} )`,
      deps: (r, c) => c < w[r]
        ? [['main', r - 1, c]]
        : [['main', r - 1, c], ['main', r - 1, c - w[r]]],
      refs: []
    };
  }

  function generateLCS(short) {
    const m = short ? 5 : 7;
    const n = short ? 5 : 6;
    const alphabet = ['A', 'B', 'C', 'D'];
    const X = Array.from({ length: m }, () => pick(alphabet));
    const Y = Array.from({ length: n }, () => pick(alphabet));
    const dp = Array.from({ length: m + 1 }, () => Array(n + 1).fill(0));
    for (let i = 1; i <= m; i++) {
      for (let j = 1; j <= n; j++) dp[i][j] = X[i - 1] === Y[j - 1] ? dp[i - 1][j - 1] + 1 : Math.max(dp[i - 1][j], dp[i][j - 1]);
    }
    const targets = [];
    for (let i = 1; i <= m; i++) for (let j = 1; j <= n; j++) targets.push([i, j]);
    const fixed = [];
    for (let j = 0; j <= n; j++) fixed.push([0, j]);
    for (let i = 1; i <= m; i++) fixed.push([i, 0]);
    return {
      kind: 'lcs',
      title: '最長共通部分文字列 LCS',
      sub: '行は X の先頭 i 文字、列は Y の先頭 j 文字。文字が同じかどうかで見る場所が変わります。',
      formula: 'xᵢ=yⱼ: c[i,j]=c[i-1,j-1]+1　/　xᵢ≠yⱼ: c[i,j]=max(c[i-1,j], c[i,j-1])',
      data: [`X=${X.join('')}`, `Y=${Y.join('')}`],
      rowHeaders: ['0'].concat(X.map((ch, i) => `${i + 1}:${ch}`)),
      colHeaders: ['0'].concat(Y.map((ch, i) => `${i + 1}:${ch}`)),
      targets,
      fixed,
      blocked: [],
      correct: (r, c) => dp[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `c[${r},${c}]`,
      activeDetail: (r, c) => X[r - 1] === Y[c - 1]
        ? `x${r}=${X[r - 1]} と y${c}=${Y[c - 1]} は同じ → 左上 c[${r - 1},${c - 1}] + 1`
        : `x${r}=${X[r - 1]} と y${c}=${Y[c - 1]} は違う → 上 c[${r - 1},${c}] と左 c[${r},${c - 1}] の大きい方`,
      deps: (r, c) => X[r - 1] === Y[c - 1]
        ? [['main', r - 1, c - 1]]
        : [['main', r - 1, c], ['main', r, c - 1]],
      refs: []
    };
  }

  function matrixHeaders(n) {
    return Array.from({ length: n }, (_, i) => String(i + 1));
  }

  function graphTargets(n) {
    const a = [];
    for (let i = 0; i < n; i++) for (let j = 0; j < n; j++) if (i !== j) a.push([i, j]);
    return a;
  }

  function graphFixed(n) {
    return Array.from({ length: n }, (_, i) => [i, i]);
  }

  function generateApspStep(short) {
    const n = short ? 3 : 4;
    const W1 = makeGraphMatrix(n);
    const m = short ? 2 : randInt(2, 3);
    let prev = W1.map(row => row.slice());
    for (let t = 2; t <= m - 1; t++) prev = minPlus(W1, prev);
    const target = minPlus(W1, prev);
    return {
      kind: 'apsp-step',
      title: `全点間最短路 W${m}`,
      sub: `W1 と W${m - 1} から「高々 ${m} 辺」の最短距離表 W${m} を作ります。`,
      formula: `e^${m}[i,j] = min( e^${m - 1}[i,j], minₖ{ e¹[i,k] + e^${m - 1}[k,j] } )`,
      data: [`n=${n}`, `W1 → W${m}`],
      rowHeaders: matrixHeaders(n),
      colHeaders: matrixHeaders(n),
      targets: graphTargets(n),
      fixed: graphFixed(n),
      blocked: [],
      correct: (r, c) => target[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `e^${m}[${r + 1},${c + 1}]`,
      activeDetail: (r, c) => `W1 の ${r + 1} 行目と W${m - 1} の ${c + 1} 列目を k=1..${n} で組にして足し、最小を取る。`,
      deps: (r, c) => {
        const a = [['ref1', r, c]];
        for (let k = 0; k < n; k++) { a.push(['ref0', r, k]); a.push(['ref1', k, c]); }
        return a;
      },
      refs: [
        { id: 'ref0', title: 'W1', matrix: W1 },
        { id: 'ref1', title: `W${m - 1}`, matrix: prev }
      ]
    };
  }

  function generateApspDouble(short) {
    const n = short ? 3 : 4;
    const W1 = makeGraphMatrix(n);
    const m = short ? 1 : (Math.random() < 0.5 ? 1 : 2);
    const base = m === 1 ? W1 : minPlus(W1, W1);
    const target = minPlus(base, base);
    return {
      kind: 'apsp-double',
      title: `全点間最短路 W${2 * m}`, 
      sub: `W${m} と W${m} を組み合わせ、W1→W2→W4… と表の枚数を減らす方法です。`,
      formula: `e^${2 * m}[i,j] = minₖ{ e^${m}[i,k] + e^${m}[k,j] }`,
      data: [`n=${n}`, `W${m} → W${2 * m}`],
      rowHeaders: matrixHeaders(n),
      colHeaders: matrixHeaders(n),
      targets: graphTargets(n),
      fixed: graphFixed(n),
      blocked: [],
      correct: (r, c) => target[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `e^${2 * m}[${r + 1},${c + 1}]`,
      activeDetail: (r, c) => `W${m} の ${r + 1} 行目と ${c + 1} 列目を、同じ k で組にして足した値の最小。`,
      deps: (r, c) => {
        const a = [];
        for (let k = 0; k < n; k++) { a.push(['ref0', r, k]); a.push(['ref0', k, c]); }
        return a;
      },
      refs: [{ id: 'ref0', title: `W${m}`, matrix: base }]
    };
  }

  function generateFloyd(short) {
    const n = short ? 3 : 4;
    const W = makeGraphMatrix(n);
    const kHuman = randInt(1, n);
    let prev = W.map(row => row.slice());
    for (let t = 0; t < kHuman - 1; t++) prev = floydStep(prev, t);
    const target = floydStep(prev, kHuman - 1);
    return {
      kind: 'floyd',
      title: `Floyd-Warshall D${kHuman}`,
      sub: `D${kHuman - 1} から、点 ${kHuman} を新たに中継点として許した表 D${kHuman} を作ります。`,
      formula: `e^${kHuman}[i,j] = min( e^${kHuman - 1}[i,j], e^${kHuman - 1}[i,${kHuman}] + e^${kHuman - 1}[${kHuman},j] )`,
      data: [`n=${n}`, `中継点 k=${kHuman}`],
      rowHeaders: matrixHeaders(n),
      colHeaders: matrixHeaders(n),
      targets: graphTargets(n),
      fixed: graphFixed(n),
      blocked: [],
      correct: (r, c) => target[r][c],
      fixedValue: () => 0,
      activeLabel: (r, c) => `e^${kHuman}[${r + 1},${c + 1}]`,
      activeDetail: (r, c) => `直接 e[${r + 1},${c + 1}] と、点 ${kHuman} 経由 e[${r + 1},${kHuman}] + e[${kHuman},${c + 1}] を比較。`,
      deps: (r, c) => [['ref0', r, c], ['ref0', r, kHuman - 1], ['ref0', kHuman - 1, c]],
      refs: [{ id: 'ref0', title: `D${kHuman - 1}`, matrix: prev }]
    };
  }

  const generators = {
    matrix: generateMatrixChain,
    knapsack: generateKnapsack,
    lcs: generateLCS,
    'apsp-step': generateApspStep,
    'apsp-double': generateApspDouble,
    floyd: generateFloyd
  };

  function chooseType() {
    const selected = typeSelect.value;
    if (selected !== 'random') return selected;
    return pick(['matrix', 'knapsack', 'lcs', 'apsp-step', 'apsp-double', 'floyd']);
  }

  function newProblem() {
    state.type = chooseType();
    state.problem = generators[state.type](difficultySelect.value === 'short');
    state.activeKey = null;
    state.values.clear();
    state.status.clear();
    state.hint = false;
    state.misses = 0;
    $('hintBtn').classList.remove('hint-on');
    $('done').classList.remove('show');
    renderAll();
    selectFirstTarget(false);
  }

  function isIn(list, r, c) {
    return list.some(([a, b]) => a === r && b === c);
  }

  function renderAll() {
    const p = state.problem;
    $('problemTitle').textContent = p.title;
    $('problemSub').textContent = p.sub;
    $('formula').textContent = p.formula;
    $('dataStrip').innerHTML = p.data.map(x => `<span class="chip">${escapeHtml(x)}</span>`).join('');
    renderTable();
    renderRefs();
    renderActive();
    updateScore();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, ch => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[ch]));
  }

  function renderTable() {
    const p = state.problem;
    let html = '<table class="dp-table"><thead><tr><th></th>';
    p.colHeaders.forEach(h => html += `<th>${escapeHtml(h)}</th>`);
    html += '</tr></thead><tbody>';
    for (let r = 0; r < p.rowHeaders.length; r++) {
      html += `<tr><th class="row-head">${escapeHtml(p.rowHeaders[r])}</th>`;
      for (let c = 0; c < p.colHeaders.length; c++) {
        const key = keyOf(r, c);
        const blocked = isIn(p.blocked, r, c);
        const fixed = isIn(p.fixed, r, c);
        const target = isIn(p.targets, r, c);
        let cls = 'cell';
        if (blocked) cls += ' blocked';
        else if (fixed) cls += ' fixed';
        else if (target) cls += ' target';
        if (state.activeKey === key) cls += ' active';
        const st = state.status.get(key);
        if (st) cls += ` ${st}`;
        const val = fixed ? p.fixedValue(r, c) : state.values.get(key);
        const display = blocked ? '' : (val == null ? '·' : fmt(val));
        const disabled = blocked || fixed || !target ? 'disabled' : '';
        html += `<td><button type="button" class="${cls}" data-r="${r}" data-c="${c}" ${disabled}>${display}</button></td>`;
      }
      html += '</tr>';
    }
    html += '</tbody></table>';
    $('tableScroller').innerHTML = html;
    $('tableScroller').querySelectorAll('.cell.target').forEach(btn => btn.addEventListener('click', () => selectCell(Number(btn.dataset.r), Number(btn.dataset.c))));
    applyHints();
  }

  function renderRefs() {
    const refs = state.problem.refs;
    if (!refs.length) { $('refs').innerHTML = ''; return; }
    $('refs').innerHTML = refs.map(ref => {
      const n = ref.matrix.length;
      let t = `<div class="ref-card"><p class="ref-title">参照表 ${escapeHtml(ref.title)}</p><div class="mini-wrap"><table class="mini-grid"><thead><tr><th></th>`;
      for (let j = 0; j < n; j++) t += `<th>${j + 1}</th>`;
      t += '</tr></thead><tbody>';
      for (let i = 0; i < n; i++) {
        t += `<tr><th>${i + 1}</th>`;
        for (let j = 0; j < n; j++) t += `<td data-ref="${ref.id}" data-r="${i}" data-c="${j}">${fmt(ref.matrix[i][j])}</td>`;
        t += '</tr>';
      }
      return t + '</tbody></table></div></div>';
    }).join('');
    applyHints();
  }

  function renderActive() {
    const p = state.problem;
    const enabled = !!state.activeKey;
    answerInput.disabled = !enabled;
    $('infBtn').disabled = !enabled;
    $('submitBtn').disabled = !enabled;
    if (!enabled) {
      $('activeCell').textContent = 'セル未選択';
      $('activeDetail').textContent = '表の空欄をタップすると、そのマスの式を表示します。';
      $('dockLabel').textContent = 'セル未選択';
      answerInput.value = '';
      return;
    }
    const [r, c] = state.activeKey.split(',').map(Number);
    const label = p.activeLabel(r, c);
    $('activeCell').textContent = label;
    $('activeDetail').textContent = p.activeDetail(r, c);
    $('dockLabel').textContent = label;
    const current = state.values.get(state.activeKey);
    answerInput.value = current == null ? '' : fmt(current);
  }

  function selectCell(r, c, focus = false) {
    state.activeKey = keyOf(r, c);
    state.hint = false;
    $('hintBtn').classList.remove('hint-on');
    renderTable();
    renderRefs();
    renderActive();
    $('hintNote').className = 'hint-note';
    $('hintNote').textContent = '「ヒント」を押すと、このマスを計算するときに参照する場所を色付けします。';
    if (focus) setTimeout(() => answerInput.focus(), 0);
  }

  function selectFirstTarget(focus = false) {
    const next = state.problem.targets.find(([r, c]) => state.status.get(keyOf(r, c)) !== 'ok');
    if (next) selectCell(next[0], next[1], focus);
  }

  function applyHints() {
    document.querySelectorAll('.cell.dep, .mini-grid td.dep').forEach(el => el.classList.remove('dep'));
    if (!state.hint || !state.activeKey) return;
    const [r, c] = state.activeKey.split(',').map(Number);
    const deps = state.problem.deps(r, c);
    deps.forEach(([where, rr, cc]) => {
      if (where === 'main') {
        const el = document.querySelector(`.cell[data-r="${rr}"][data-c="${cc}"]`);
        if (el) el.classList.add('dep');
      } else {
        const el = document.querySelector(`.mini-grid td[data-ref="${where}"][data-r="${rr}"][data-c="${cc}"]`);
        if (el) el.classList.add('dep');
      }
    });
  }

  function toggleHint() {
    if (!state.activeKey) selectFirstTarget(false);
    if (!state.activeKey) return;
    state.hint = !state.hint;
    $('hintBtn').classList.toggle('hint-on', state.hint);
    applyHints();
    if (state.hint) {
      const [r, c] = state.activeKey.split(',').map(Number);
      $('hintNote').className = 'hint-note visible';
      $('hintNote').textContent = state.problem.activeDetail(r, c);
    } else {
      $('hintNote').className = 'hint-note';
      $('hintNote').textContent = '「ヒント」を押すと、このマスを計算するときに参照する場所を色付けします。';
    }
  }

  function submitCurrent() {
    if (!state.activeKey) return;
    const value = parseAnswer(answerInput.value);
    if (value == null) { toast('整数か ∞ を入力してください'); return; }
    const [r, c] = state.activeKey.split(',').map(Number);
    const correct = state.problem.correct(r, c);
    state.values.set(state.activeKey, value);
    if (value === correct) {
      state.status.set(state.activeKey, 'ok');
      toast('正解');
      renderTable();
      updateScore();
      if (isComplete()) {
        $('done').classList.add('show');
        state.activeKey = null;
        renderActive();
      } else {
        const currentIndex = state.problem.targets.findIndex(([rr, cc]) => keyOf(rr, cc) === keyOf(r, c));
        let next = null;
        for (let step = 1; step <= state.problem.targets.length; step++) {
          const candidate = state.problem.targets[(currentIndex + step) % state.problem.targets.length];
          if (state.status.get(keyOf(candidate[0], candidate[1])) !== 'ok') { next = candidate; break; }
        }
        if (next) selectCell(next[0], next[1], false);
      }
    } else {
      state.status.set(state.activeKey, 'bad');
      state.misses++;
      toast('違います。ヒントで参照セルを確認');
      renderTable();
      updateScore();
    }
  }

  function checkAll() {
    let filled = 0, wrong = 0;
    state.problem.targets.forEach(([r, c]) => {
      const key = keyOf(r, c);
      if (!state.values.has(key)) return;
      filled++;
      if (state.values.get(key) === state.problem.correct(r, c)) state.status.set(key, 'ok');
      else { state.status.set(key, 'bad'); wrong++; }
    });
    renderTable();
    updateScore();
    if (!filled) toast('まだ入力がありません');
    else if (wrong) toast(`${wrong} マスを見直してください`);
    else if (isComplete()) { $('done').classList.add('show'); toast('表が完成しました'); }
    else toast('入力済みのマスは合っています');
  }

  function clearInputs() {
    state.values.clear();
    state.status.clear();
    state.activeKey = null;
    state.hint = false;
    state.misses = 0;
    $('hintBtn').classList.remove('hint-on');
    $('done').classList.remove('show');
    renderAll();
    selectFirstTarget(false);
    toast('入力を消しました');
  }

  function updateScore() {
    const total = state.problem.targets.length;
    let ok = 0;
    state.problem.targets.forEach(([r, c]) => { if (state.status.get(keyOf(r, c)) === 'ok') ok++; });
    $('score').textContent = `${ok} / ${total}`;
  }

  function isComplete() {
    return state.problem.targets.every(([r, c]) => state.status.get(keyOf(r, c)) === 'ok');
  }

  $('newBtn').addEventListener('click', newProblem);
  typeSelect.addEventListener('change', newProblem);
  difficultySelect.addEventListener('change', newProblem);
  $('hintBtn').addEventListener('click', toggleHint);
  $('checkAllBtn').addEventListener('click', checkAll);
  $('clearBtn').addEventListener('click', clearInputs);
  $('submitBtn').addEventListener('click', submitCurrent);
  $('infBtn').addEventListener('click', () => { if (!answerInput.disabled) { answerInput.value = '∞'; answerInput.focus(); } });
  answerInput.addEventListener('keydown', (e) => { if (e.key === 'Enter') submitCurrent(); });
  answerInput.addEventListener('focus', () => { if (state.activeKey) answerInput.select(); });

  newProblem();
})();
</script>
</body>
</html>
